spring.application.name=gateway

# If using Spring Cloud Gateway with service discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# OR define explicit routes (example paths)
spring.cloud.gateway.routes[0].id=customer-route
spring.cloud.gateway.routes[0].uri=lb://customer-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/customers/**

spring.cloud.gateway.routes[1].id=audit-route
spring.cloud.gateway.routes[1].uri=lb://audit-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/audit/**

spring.cloud.gateway.routes[2].id=address-route
spring.cloud.gateway.routes[2].uri=lb://address-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/addresses/**

spring.cloud.gateway.routes[3].id=user-profile-route
spring.cloud.gateway.routes[3].uri=lb://user-profile-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/users/**

# Optionally, CORS defaults (adjust as needed)
#spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:3000
#spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
#spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
