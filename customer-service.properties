spring.application.name=customer-service
server.port=9001

# Base DB (can be dev-like for local defaults)
spring.datasource.url=jdbc:mysql://localhost:3306/customerdb
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Hikari (safe defaults)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Inter-service URLs (if not using Feign/Eureka name resolution)
address.service.url=http://localhost:9003/validate
audit.service.url=http://localhost:9002/audit

# Demo flag to show active profile in responses/logs if you want to print it
app.environment=BASE DEFAULT
