# Prod database
spring.datasource.url=jdbc:mysql://localhost:3306/customerdb_prod
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password

# Prod behavior
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update   # change to 'none' if you manage schema externally
logging.level.com.cognizant=INFO

# Pool can be higher for prod
spring.datasource.hikari.maximum-pool-size=20

app.environment=PROD PROFILE ACTIVE
